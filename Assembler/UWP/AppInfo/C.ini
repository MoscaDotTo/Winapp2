; This file is part of a collection of winapp2ool ini files that are used to generate winapp2.ini
; and thus is not intended to be used standalone or with any cleaning software
;
; Most entries in these files are incomplete and may not function as expected if used on their own
;
; This file is one of 27 alphabetically-split AppInfo files used by winapp2ool's UWPBuilder module
; At runtime, all 27 AppInfo files are combined in-memory and processed alongside UWP.ini
; to generate winapp2.ini entries for Universal Windows Platform (UWP) applications
;
; This file contains entries for applications whose names begin with the letter C
;
; Each section in the AppInfo files describes one UWP application
; Section names must follow the format [Application Name *] — the trailing " *" is required
;
; AppInfo sections support the following keys:
;
; Package
; The folder name of the application's UWP package under %LocalAppData%\Packages
; For single-package applications, use Package=<FolderName>
; For multi-package applications, use Package1=, Package2=, etc.
; At least one Package key is required
; The package folder path is automatically used to generate a DetectFile in the output entry
; %Package% (or %Package1%, %Package2%, etc.) can be used as a variable in FileKeyBase and FileKey values
; %Package% expands to %LocalAppData%\Packages\<PackageFolderName> in the generated entry
;
; LangSecRef
; Assigns the entry to a CCleaner section by numeric ID (e.g. LangSecRef=3021)
; Exactly one of LangSecRef or Section is required
;
; Section
; Assigns the entry to a custom named section (e.g. Section=Games)
; Exactly one of LangSecRef or Section is required
;
; Detect
; A registry key path used to detect that the application is installed
; Optional — the package folder is always used as a DetectFile regardless
; Multiple Detect keys are supported — define them as Detect=, Detect2=, etc.
; All values are passed through verbatim and renumbered in the generated entry
;
; DetectFile
; A file system path used to detect that the application is installed
; Optional — the package folder is always used as the primary DetectFile
; Useful for hybrid win32+UWP applications that also have a traditional installation
; All values are passed through verbatim and appended after the package-generated DetectFile
;
; FileKeyBase
; An app-specific FileKey template using %Package% or %PackageN% variables
; %Package% expands to %LocalAppData%\Packages\<PackageFolderName> in the generated entry
; %Package1%, %Package2%, etc. target a specific package by position in multi-package apps
; App-specific keys are added after the scaffold keys from UWP.ini, in document order
;
; FileKey
; A standard winapp2.ini FileKey targeting win32 or non-package file locations
; Can also use %Package% or %PackageN% variables — expanded identically to FileKeyBase
; Useful for hybrid win32+UWP entries that clean both packaged and non-packaged file locations
;
; RegKey
; A standard winapp2.ini RegKey value
; Optional — passed through verbatim and renumbered from 1 in the generated entry
;
; ExcludeKey
; A standard winapp2.ini ExcludeKey value
; Can use %Package% or %PackageN% variables — expanded identically to FileKeyBase
; Optional — renumbered from 1 in the generated entry
;
; Skip
; Tells winapp2ool to skip this application when generating entries
; Used to discontinue support for an application without losing its configuration
; This value appears Boolean but is not — Skip=False _WILL_ result in the app being skipped
; Provide this key if and only if you want the app to be skipped
