;
; This file is part of a collection of winapp2ool ini files that are used to generate winapp2.ini
; and thus is not intended to be used standalone or with any cleaning software
;
; winapp2ool uses this file to define the baseline cleaning targets applied to every UWP application
; This ensures that all entries receive a consistent foundation regardless of what app-specific
; keys are defined in the AppInfo files
;
; This file is combined with the contents of the AppInfo\ folder at runtime
; The scaffold keys defined here are applied to every app before any app-specific keys are added
;
; This file contains one section type:
;
; EntryScaffold
; Defines FileKey patterns that are applied to every generated UWP app entry
; Every EntryScaffold section name must have the format [EntryScaffold: Template Name]
;
; EntryScaffold sections support the following keys:
;
; DetectFileBase
; A DetectFile path template applied to every UWP application entry
; Use %Package% to reference the application's package directory
; %Package% expands to %LocalAppData%\Packages\<PackageFolderName> during generation
; For multi-package apps, one DetectFile is generated per package in order
;
; FileKeyBase
; A FileKey template applied uniformly to every UWP application entry
; Use %Package% to reference the application's package directory
; %Package% expands to %LocalAppData%\Packages\<PackageFolderName> during generation
; For multi-package apps, one FileKey is generated per package in order

[EntryScaffold: UWP App]
DetectFileBase=%Package%
FileKeyBase=%Package%\AC|*|RECURSE
FileKeyBase=%Package%\Settings|*.log*
FileKeyBase=%Package%\SystemAppData\Helium|*.log*
FileKeyBase=%Package%\TempState|*|REMOVESELF
